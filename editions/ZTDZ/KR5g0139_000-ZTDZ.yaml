front:
  text: 洞真太一帝君太丹隱書洞真玄經廣一
  hash: sha256:77b64027b73fd40fe2a61b09fed4074b667f1bb38760b897bbf9fe12644d89a0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0139_SJB_000-330528c, image: sjb/33/330528c.png}
body:
  text: 一名三元浩篇紫微夫人初受此經時先作此誦曰絳景浮玄晨紫軒乘雲征仰超金闕内俯眄西華城東霞啓五暉神元煥七靈翳映紀三燭流任自齊冥風皷空洞宇香煙散玉庭手𢹂織女儛𩀱衿落錦青左徊文羽旗華盖隨雲傾宴寢九庭外是非不我營抱空泥丸内天姿與日嬰豈同𠎝穢中慘慘無聊生扶桑翠空峯朱靈葩微明滄臺宵虚上四觀映髙清飛景控紫輪三素轡丹軿偃宴太帝館嶅曹阿毋庭濯漱碧瀬波提契玉醴甖曲晨乘風扇瑶飈時下傾蹔適圯藹中迴駕汜良貞玄㑹自相要流浪任玄冥始知榮辱辛方悟憂促齡曲室可清浄頥真待日成何爲講當塗百痾從是生紫微夫人姓王諱清娥字愈音云是西王母第二十四女紫微宫在北溟外羽明野玄壟山玄壟山在崑崙山之東北紫微說阿母言曰欲存服日月炁者當知日月景象日圓形而方景月方精而圎象景藏形内精隱象中景赤象黄是爲日月之魂若知其道乃可以吐納流霞耳服日炁之法以平旦採月華以夜半存之去面前九寸令光景照我泥丸下及五藏洞徹一形引炁入口光色蔚明良乆乃畢常得長生右中侯夫人說紫微諱字太一帝君太丹隱書洞真玄經如是寳經藏之太上六合紫房之内南極元君主之故曰太丹隱書此書一名帝君七化變景九形一名太一三度帝寳五精一名帝一混合三五立成各四時寳焉故緫合太一之經也子若有之者不死奉之者長生存之者神仙懃之者真靈矣太一虚生上玄道君命太極真人遣玉華玉女九人金華晨童七人侍衛洞真玄經營護有經者身擁濟佩符者魂玉童玉女記諸罪福言功懃修者子有是經當立宻屋寢䖏不雜宣通冥㑹以期真炁又嘗燒香左右數自沐浴黙爾存神人莫覺焉太極真人三春記書曰太一帝君太丹隱書洞真玄經三夏記書曰帝君七化變景九形三秋記書曰太一三度帝寳五精三冬記書曰帝一混合三五立成故四時異號隨節甞生所謂混合萬變不居一名是爲至道之書以致真靈也夫學道而无太一猶視瞻之無兩眼存念而無太一猶胷腹之失五藏御神而無太一猶起行之無四支立身而無太一猶尸僵而無炁矣是爲此經開通萬神生成魂津千塗百徑須太一而立一人焉若學無師者徒自煩勞也今别復撰此經之波流鈔出其外際未陳幽妙靡該祕唱名爲太一别訣如有可尋以悟始渉末今頓開深源者也自使别訣微行於學者渉麤跡以玉覺焉至於幽玄内搆合竒萬津流㑹真神混合靈府煒燁于神景之變發曜于造化之外煥如圎曜寂如太無欝起而空洞結雲凝思而千年繼夜可謂微午深哉太一之愛也皆理竭於此經事悉於洞玄者矣夫人者受生於天魂結成於元靈轉輪九炁挺命太一開關三道積神幽宫所以玄液七纒流津敷澤日月映其六虚口目運其神噐雲行雨施德擬天地胞胎内一匠五因來具立人之道其如此也故五因者是五神也故三道者是三真也夫五神天之魂也三真天之道九炁天之胎太一天之源日月天之眼玄液天之潤六虚天之光幽宫天之府神噐天之化元靈帝之變凡此言九炁者乃混合帝君之變變而化九是謂九宫混變而同一矣夫兆欲修巳求生當從所生之宗所生之宗謂元父玄毋也元父主炁化理帝先玄毋主精變結胞胎精炁相成如隂陽相生雲行兆巳道合無名數起三五兆始禀形七九旣帀兆体乃成和合三五七九洞冥象帝之先當須帝營天皇之功九變爲靈功成人體體與神并神去則死神守則生是以三元爲道之始帝君爲道之根太一爲道之變九天爲道之神九宫爲道之宅玄田爲道之圃玄液爲道之津修之三年可以照鏡三田以致神仙朝適六合夕守泥丸堅執胎精心中常歡後學之子須此爲縁見是經者始可與言九炁陶注太一運神矣子旣得爲人人亦衆矣自无太一靈簡三元金名司命隱符五老紫籍雖受天炁而生皆不得聞見至道矣子又無玄宫紫札上皇寳名太一玉籙東華隱圗三元銘神太帝叅魂者雖受天之性旣得暫聞至道矣亦不能修爲爲不能乆乆而不固固而不專專而不能洞也適可隱存五嶽登行常生之塗耳不得八景超宵浮煙控暉飛騰虚羽踴躍太無矣子又無瓊臺羽札流雲五校太一金閣五皇隱籙後聖七符空山石函丹臺素章玄黄玉行天母抱圗太上圎名保真秀炁九錬神軀之録者皆不得見洞真玄經覩帝一之變又不得聞消魔神虎智慧之詠又不得聞太上隱書八素之辤又不得聞大洞真經三十九章金真玉光豁落七元也夫至道之經幽幽冥冥唯在勤心存念注心冥㑹然後靈以啓運神以宻感九神合聚太一書簡徐乃得聞玄妙之門生命之本源微乎玄矣可不勗之哉存念太一混合帝先雄雌守神灌流浩清常使九天順炁則一合九成也夫洞真其要也則一體常存津血自生雄鎮命户雌守神室太一無離與天同時故太上隱符曰存其雄守其雌乃天地不能彌也旣存之焉則五神守宅五藏生華靈栖絳宫帝鎮泥丸百神堅固胎塞命門乆則三一之神夕見太一帝先晨降並見形於子之寢䖏也子當清潔齋浄斷絶外事杜塞邪徑節諸人物罕爲修詣精心在一晨夕修道孜孜不替沐浴五香别静一室燒香左右以期真炁夫太一之道尤忌見血腥臰臊殗穢之炁若泣涕墮落則帝君悲擾哭聲發口則太一凝結太一凝結者九炁止而不變三一悲而不攝九炁不變則三一亦結結滯日積則生炁泄出而故炁運入故炁運入將病將死之始也是以真人謂哭音爲死絶之聲謂泣涕爲漏精之津可不慎避之哉若一見死尸及積日哀哭者則帝君獲罪謫於太上太一受考譴於玄虚也未及三年子必亡矣諸不受太上之道者自不得同之於學生也所以至忌哀哭殗穢憂淚之感以爲太一帝君之精思也又不得臨見死尸自受書之後若見四十九尸者皆不得長生必中道絶命若見二十四尸者則當暫過太隂然後起仙以爲死尸之形旣眄於兩眼尸鬼之胎亦滯纒於人思人思所存記於絳宫絳宫所識雖忘猶存宜漸歸身顯尸塞思記之眼故也子厚慎之哉見血尸䘮殗穢哀哭泣涕皆太一之至忌也若常齋浄則存思易感精神立㑹太一鎮命歡欣混合行之一十八年白日昇天此真人廽老反嬰之道也常當沐浴五香五香者青木香也青木華葉五節五五相結故曰五香之草也辟惡氣檢魂魄制鬼煙致靈跡以其有五五之節所以爲益於人耶此香多生滄浪之東故東方之神人名之爲青木之香焉又云燒青木香及薫陸安息膠於寢䖏頭直之間者以開通五濁之臰止地上魔邪之氣直上衝天四十里此香之煙也破濁臰之炁開却邪穢之霧故天人玉女太一帝皇隨香炁中而來下憇子之面目間焉燒香夜半時亦常存而爲之勿廢忘也存三一守太一精洞房㑹帝君則化生九靈於子形中輔子之神明成子之仙真保子之長生固子之胎魂也白元無英桃康司命太一混合五神捧籍列符五神各有所主混合九變三五洞化於是三宫鎮真百節受靈帝君寳籍宿命無傾周旋虚煙啓通玄精二十四真忽然而生上開上元下開八冥左朝六甲右使六丁玉華引日太一并形千乘萬騎舉身登晨白日昇天真人修是太一之道者皆得三天之舉故曰舉身登晨白日昇天以鷄鳴時晨登空無比日之中到于三天之上日之正中爲白日鷄鳴之始爲登晨是以存太一混合多用鷄鳴及生炁時也子有太一洞真玄經者别爲囊笈封以寳噐盛之机上每事朝拜如奉君父若所作所向必先啓白再拜三宻呼太一九君名字因言所欲求乞夣應以占吉凶其心精到者卧覺之時立有感効也若宜誦習施行看省者别寫一通以謹案之至於机上之經以爲尊寳三元隱化則成三官宫名太清太素太和是也三三則九故有三丹田又有三洞房合上三元其則九宫九天九宫中有九神是謂天皇九魂變成九炁化爲九神各治一宫故曰九宫太清中有太素太和洞房中有明堂絳宫是曰六府上曰天府下曰洞臺三五之號其位不同一曰太清之中則三五帝君二曰三一丹田神又五者符籍之神太一公子白元司命桃康君是也合而名爲三五三五各有宫室若三真各安在其宫五神上見帝君帝君左有元老丈人右有玄一老君此則無極之中所謂九君上一則真一也九君所謂天之魂自然成真之子也以爲兆神者也若兆知精存九君深思三真必能以兆一體周旋三五之中反覆七九之裏使天帝之靈魂常治在兆已五神捧籍周而復始必將白日登度何但不死而巳哉帝君混化周旋三五太一萬變結成七九其數合二十四也天有二十四炁炁之上化也變而則成真人人亦禀之故體有二十四神神有千乘萬騎雲行八極之中子若思存念之慎勿忘可以辟死求生上超十方於是神安炁洞上與天通越出地户過度天門隱息四維七星散分飛行雲房日月殖根守金藏玉制御萬神仙王何人我已成其真矣此隱存之道也並有經訣在上皇中極寳景篇中子旣有之不得妄傳必須歃誓審人乃宣帝一道尊七九萬化所謂一變萬千七九復還天道不逺三五復反子知一尊長生飛仙子知三五横行天下不知一尊雖生無根不知三五身歸於土斯言信也大洞真經曰天有九魂不可不分道有三真不可去身帝一變景萬化以臻流珠停暉紫霞踊煙七度逥路三光映真太上精符相與爲親斯言妙也又髙上神霄經曰魂生無中布在九宫道出三極常遊絳宫三宫合化是爲紫房紫房所在先由明堂兆能知之當開金門金門洞房之内也又曰混而合之出入帝方三五合一必成仙王此謂混合之時三真五神之道也帝方太清域也故大洞真經中篇曰二老在左右方帝魂不可不分三九變其上下太一立其中根五神奉我生籍司命塞我死門九宫合而爲一六合緫而内真也此言謂分别其宫室混合其變化此道是太上寳行長生根本立人之帝先爲道之元始生府之仙宗帝籍之祕章洞真之竒妙九宫之要經也九真中經曰九魂離合三光同暉天皇在元紫煙霏霏五神奉圖性命不𧇊變入九宫帔服朱衣腰帶虎章流雲綉帔幃帔瓓斑五色徘徊日月照察俠以東西神庭内體以除渴飢三五復反轉藏營機周流太一生均兩儀謂天皇在太清中太一受哺養五神奉符籍之時學者存日月以俠照也此中經一篇指說太一之名事故記出焉夜半生炁時若雞鳴時正卧閉目微炁存左目中出日右目中出月並徑九寸在兩耳之上兩耳之上名爲六合髙䆫也令日月使照一身内徹泥丸下照五藏膓胃之中皆覺見了了洞徹内外令一身與日月光共合良乆畢叩齒九通咽液九過乃㣲祝曰太上玄一九皇吐精三五七變洞觀幽冥日月垂光下徹神庭俠照六合太一黄寧帝君命簡金書不傾五老奉符天地同誠使我不死以致真靈却遏萬邪禍害滅平上朝天皇還老反嬰太帝有制百神敬聽畢乃開目名爲日月鍊根三元校魂以制御形神辟諸鬼炁之來侵使兆長生不死夕夕存之矣又存左目爲日右目爲月共合神庭之中却上入明堂之中化生黄英之醴下流口中九咽之以哺太一常以生炁時存之畢㣲呪曰日月上精黃水月華太一來飲神光髙羅使我長生天地同柯畢五日行之口中舌上爲神庭存日月旣畢因動舌覺有黄泉如紫金色從舌上出上流却入明堂之中名爲黃英之醴也存思之時當閉目絶念常以月朔之夕生炁之時安卧閉目向上心存二十四星星大一寸如相連結之狀又存一星之中輙有一人合二十四人人皆如小兒始生之狀無衣服也於是二十四星直從天上虚空中來下逥繞一身外三帀三帀畢以次咽以入口中凡作二十四咽咽時輒覺吞一星也覺從口中徑至臍中臍中名曰受命之宫也又覺星光照一腹内洞徹五藏又存星光化爲二十四真人並吐黄炁如煙以布滿臍中欝欝然洞徹内外也良乆㣲呪曰二十四真迴入黄庭口吐黃炁二十四星灌我命門百神受靈使我骨彊魂魄安寧五藏受符天地相傾畢名曰真炁入守命門以辟災禍百鬼之疾令人長生不死太無混合以象一靈虚生之子以爲上帝君又居泥丸之帝以爲三一之尊帝尊帝者是虚生之子也是謂三帝焉太一受生於空洞變化乎八方立景於三帝之間流會乎萬神之領天地之尊皆須太一而自運也靈帝無太一則玄虚不迴炁尊帝無太一則三一不居其宫域故太一之神併五神以通用上舎體於三帝帝之爲髙猶天皇帝君者也等形九魂魂生三五三五合㑹結成帝君將帝之生也受玄中上炁三五離合之所挺焉是以帝生於無極之表玄成之中見於太清之域治在玉清紫㣲宫中光曜五色華盖九重前洞泥丸後開幽門下臨六合上連紫雲百官宿衛飛閣交通玉殿朱陛内有金房中有太真號曰天皇憑虚而生䖏無極之中衣五色珠衣冠九德晨冠制御天岡時乘玉龍六轡超虚九道自通此自然之精炁衆真之帝君兆常思而誦之可以爲仙王太㣲中有三皇一曰皇君二曰天皇三曰皇老此皆三元之炁自然混成之真也三元各是一君同在太清之中太清有三宫無上爲天皇帝君之宫左爲太素宫右爲太和宫三宫所在泥丸之門無極之内故皇君御一緫持神剛天皇統二變景守形皇老監三維制萬神太一混合成生兆身於是三五分化塡滿九宫故太一之神爲化生之主也太素君元成老子亦天之魂治在太清之中勾陳之内常侍帝君主真元之炁也號曰大素君矣太和君皇成老子天之魄也亦治太清勾陳之内號曰太和君常侍天帝主胎元之氣也太素太和二君此天地之魂魄生於自然太素元成老子太清之中常侍帝君皇成老子常侍天帝出入紫微正在崑崙黃闕紫房太一相叅混沌三炁大道之根子常思之帝來長存以月二日三日夜半存元成皇老之法安卧閉目先思太極中皇帝君次思左有元成老子衣青衣冠九華曜冠左手持青芝右手執青幡次存右有太和君黃成老子衣白衣冠五華白冠左手持金液漿右手持白幡並在太極之中太極之中有九名太清中有五帝六府九官名其域同一也一曰太清二曰太極三曰太㣲四曰紫房五曰玄臺六曰帝堂七曰天府八曰黃宫九曰玉京玄都要而言之從人項上直下一寸爲太極宫太極宫方一寸耳太極宫在六合宫之上六合宫太一之神居焉從兩眉間却入一寸爲明堂却入二寸爲洞房却入三寸爲丹田其明堂之北洞房之南兩眉之間上一寸爲六合宫六合宫方一寸存三真人畢又存我魂一人如我之狀上入太極宫中二老因授青芝金液漿見與以次存食青芝而飲漿青芝似蓮華漿似美酒耳飲食都畢乃巳存再拜帝君之前而言曰今日告青帝君在庭賜以神芝金液玉漿二老度籍太一奉章長生乆視夀命未央又存帝君答曰幸哉奉時月二日三日復來畢因以取服名曰受帝之藥於紫房之中也故消魔經曰魂可求食上詣太極二老授命帝君之力是此謂也存思太極之時皆當從兩眉間而入焉兩眉間爲泥丸之玉門名曰守寸黃闕紫房矣常以本命日或正月一日或以六戊日正中兆冠帶入室北向再拜呪曰髙皇帝君太上玉晨皇天元老無上大道曽孫王甲願帝君長安兆巳紫房宫中其夜人定時入宻室正卧冥目上向存念北斗太極中央大明星精曜正黄光炁來下存兆目前引入口中咽三十七過止存使黄精和炁塡滿太倉黄庭中下丹田下至隂室地户周行帀體悉令畢至乃又念紫房宫中有五人歘象成五帝天皇帝君正在中央太一來上當跪帝前奉兆命藉司命立後除兆死録存削去死録死録黒簡白書也生録白簡青書也存見白玉之簡曽青之筆司命進授此白簡青筆於帝君帝君伏南向而書之曰某郡縣郷里王甲字乙生簡記年長生上玄所向如願爲真爲仙天下見者皆曰真人太一司命保護甲身永養日月壽百萬年又心存籍簡一枚令長一寸廣五分耳思念書字極令了了又次存太一公子白元司命桃君五人從六合宫中上入紫房入紫房中各奉青玉案案上各有一符符各有青緑色以呈帝君帝君以次取符付向者共化之四帝其一帝名曰彫梁際字青平其一帝名長來覺字南和其一帝名彰安幸字西華其一帝名保成曷字北伐存此四帝並共讀五符讀五符畢因授以與兆兆得符即跪帝君前以次服之存一符令長一寸廣五分耳即畢又存四帝從虚空中上昇三天臨去各告兆曰子能常存我名字者則辟萬害長生不死我太上之子三元之内真度汝命籍五符入形故以永存天地以致仙靈也若春月也則存青平帝以青液之醴盛以青玉椀一升見與服之服之畢四帝俱上昇三天也若夏月也則存南和帝其四時倣此矣所服之醴椀亦隨春夏秋冬之色耳又存帝君之左有玄一老子服紫衣建龍冠又存帝君之右有三素老君服錦衣建虎冠夫龍虎之冠象如世間逺逰冠而有龍虎之文章也玄一老子名林虚夫字靈時道三素老君名牢張上字神生道二老並從正一仙人在後其左仙人仲成子一名帝賔字四華其右仙人曲文子一名光堅字靈和服色衣冠亦如二老之狀畢又存司命下至六合中詣太一宫司命合形太一太一復上請帝君度兆符籍太一啓帝君曰符籍巳度司命合形四帝賜醴髙上記生乞得書名出籙以付二老君於是帝君忽於懐中出兆命籍付左老子又於懐中出兆五符付右老君二老受符籍而言於帝君曰某甲生録巳定長存世上帝符五行上記太素宫於是二老命二正一仙人仲成子曲文子賫某甲命籍五符上詣玉清太素太上三元上清髙玄諸君九天宫宣令帝度某甲生籍使得神仙號曰真賢二老有命皆使記焉於是二人賫兆符籍宣于九天良乆都畢又存司命太一分形各爲一人共遊行太清檢御一體百神上下旣帀各還其宫名此爲百神混合本命帝君大變之道五帝定録之時二老定生之㑹也混合本命之時衆事煩多不能詣識者可宻室按文讀而爲之其三一之神泥丸丹田宫别有天帝君是紫房帝君之子也混合本命時先存在三一天帝絳宫命門三神各安其宫此宫别有三一經也今所混合萬變者非三一之天帝也三一天帝自復有混合之時耳别各有異法法任不同也帝君主變太一主主司命主命无英主精白元主魂魄桃康主神靈人有五籍五符禀之帝君五神執之各主其一間關本命除死上生而無太一之事者萬不生也雖復志道求生精誠虚盡亦無益也縱復有至徳天地功顯三官柔仁之行感徹萬神不知思存皇君内修三五還五籍奉五符令太一詣帝君請兆求仙終不能過度七九之中上𥙷仙官矣諸帝一君二老及三真五神名字慎不可以示人禍滅子門矣太一寳訣待盟乃傳寳訣者洞真玄經也先審其人然後乃以金青爲誓以代歃血之盟也又日日心存常令三魂入在太極宫與帝君周旋爲佳也又常以本命日勿言惡事當閉室存生之炁得爲善行慎勿違之矣太一者胞胎之精變化之主魂魄生於胎神命氣出於胞府變合帝君混化爲人故太一之神生之母帝君之尊生之父太一名務猶收字歸會昌又一名解明一名寄頻此三元洞玄内寳經之真名字外訣雜鈔云云之名皆非實非真也今此名字甚不可告人自知之者長生不死辟却萬禍能致神靈玉女來降巳矣夕夕當存太一在巳身中六合宫或存太一在兆左右坐卧背向無不在也皆以生炁時存之畢呪曰太一之精起於太清魂魄受化形影爲靈攝御百神拘制三陽帝君主煙合真㑹昌内安精炁外禳災殃却除死籍延命永長衣服老少變易無常常治六合周旋絳宫下達洞門上到玄郷混合三五逰息天庭呼引日月變化雌雄攝兆符籍胞胎之囊死生之命太一扶將存太一與兆形正同衣服亦同也是以兆之身常當齋潔而修盛以求會景於太一也衣服巾物一不得假借於不同炁者諸如此𩔖皆當慎之子旣不能服食去谷精思研真矣當節諸臊穢腥血雜食葷辛之菜一爲禁絶若能如此少以愈矣可以庶生命之長矣左無英公子結精因之主三元上炁之神結精田於天精精生歸於三炁矣故無英公子常攝精神之符命也名玄元叔字合符子又一名元素君一名神公子常在玉房上清之内夕夕存思之畢呪曰太上玉真皇精相連三元英炁太玄紫晨九霄挺明五華生煙黃闕金室中有大神握固流鈴首建華冠紫盖逥飈龍文虎文貌狀嬰兒四靈同均出丹入虚合形帝君呼隂召陽天道有真名曰玄元叔號爲無英君周流九道散化五常生我扶我與道長存右白元君者或曰洞陽君也主攝魂魄之炁檢御靈液之神故魂魄生於九靈之宫神液運於三炁之真是以主御之者號曰白元洞陽君攝持魂魄之符命焉白元君名欝靈摽字玄夷絶又一名朱精一名啓成治在玉堂上清之内夕夕存思畢呪曰太上神精髙清九君三炁結變正當神門龍衣虎帶扶命還魂腰佩玉書黃晨華冠把籍持符呼吸混分名曰欝靈號曰白元與我俱逰上到陽關周旋九清六合之中下養精液泥丸上元百神扶將各鎭寳宫檢御旣畢還安黃房中央司命君者或曰制命丈人主生年之本命攝夀夭之簡扎太一變魂而符列司命司命混合而對魂帝君故司命之神主典年壽魁柄長短之期是以混合之大以符籍而由之故稱丈人焉名理明初字玄度卿一名神宗一名靈華白日治幽極宫通御隂房出入神廬兩門中夕治在玄室地户之中幽宫之下六合宫之上一界中耳隂房者是鼻之兩孔中也司命出入當由鼻孔不從兩眉間也夕在玄室爲玉莖之中地户亦爲隂囊中也若女子存之令在隂門之内北極中夕夕存思焉存畢呪曰皇一之魂化成九宫混合三真變景帝庭幽極玄户中有天靈周旋七運百神合成攝籌把筭司命之精龍衣虎裙冠巾七星常在我巳安存我形號爲丈人名曰理明上通符命使我長生三元六府萬關調平攝御靈炁與兆合并龍輪徘徊共登太清齊光日月幽幽冥冥刻命青録天地倶傾命門桃君者攝禀炁之命此始炁之君也還精歸神逥精變白合化規始挺生立肇寔天地之資元隂陽之靈宗金門玉關房户之寳並制命於桃君之炁也故太一還景帝君合魂還景者俱混同以萬變合魂者化精液而生生也精變之始由桃君而唱以别男女之兆焉桃君名孩道康字合精延一名命玉一名胞根白日治在金門五域之中是爲臍中命門下丹田之宫也夕治在六合中太一之右焉夕夕存思畢乃祝曰玄元結精虚無合煙胞胎之結隂陽之親太上三炁下入兆身百節受靈萬神各陳混沌爲一名爲桃君形如始生暉暉衝天衣服五色華綵風文手執神符合帝之魂腰帶虎書赤巾丹冠金牀玉榻正當命門口吸精炁強我骨節右有神女手把朱幡左有玉童書記帝言陽炁左行混變未分隂炁右逥流行七旋下至無下上詣泥丸常逰九宫出入幽門攝鍊魂魄六府之間領録萬神與我俱仙右三五混合化生五神之法此五神者禀五炁之大靈符玄命之宗也上生虚無下結一身身中之生生須五神以起居焉兆當夕夕存思而祝之焉若不能闇諷可白日按文而修之不必夜半要生炁時耳夫三魂生於五神三真出於五靈故謂此道爲混合三五之法焉行之者長生不死名此道曰北察明堂曆神紫宫生化三五朝胎上元者也雖巳得仙者亦當行之行之者常生也存思之時坐卧任意若坐者得向本命爲佳若不能頓思五神者可以次先存二神後存三神周而復始先從太一始也夫精思存念欲得至清至静幽房閑室若山林之中不與人接聲穢濁炁所不聞乃可行之先念三五混合之法訖乃又閉目内視叩齒九通咽液九過乃微呪曰九元之真真有三田雲房金室中有五靈拘制威剛變化幽冥迴帀玄鏡周緯天地三五復反混合太清陽炁流潤化入無名與我俱仙上至神庭日月相望三光渾形越出八極頭冠天精左旋右顧手把七星隱身太微元始炁并呪畢又存五神各安坐其宫五神並吐紫炁以纒我身覺紫炁欝欝然也内外冥合手足不相見者乃止又存日月出我左右頰間左日右月二光洞照於是紫炁豁然而除又存日上入我口中即食之食之作𥹋味九咽止又存月入我臍中當命門下照隂室之間又存我手把北斗七星之柄戴以行歩入紫房太㣲宫中見帝君帝君曰子之得神仙子之得長年我以子上青玉之符書九有之天我再拜曰乞隱息太㣲合景太一列侍帝君周旋靈室帝君即召太一太一來帝君前我又入太一口中焉合形一景與太一共爲一身體良乆都畢名此爲混合太清化入無名日月相望手把七星同形太一隱身帝庭者也存念五神都畢呪文内視所思都訖乃開目啄齒五過以左手第三指躡鼻下人中七過以右手第二指躡兩眉間九過此爲却轡三五七九封制百神門户之法令百神安兆宫室三真固兆一體五神守兆符命帝君監兆萬闕也施行之畢又祝曰三五相反天覆地始我有五符上歸帝子三元長留營室之裏五色相通方圎元紀外禳百凶内拘百史三真扶我五神護巳統御魁剛使我不死呪畢存太一坐六合宫中故與我合形同景也乃還兩手指放其所攝䖏又以兩手掩口微呪曰太一告諸神皆持隂陽關不得妄去其宫室當受對於帝君一如三真法二如九天命此混合變化所存所行都畢也太一常以甲午丙午戊午日月中時下遊絳宫合形真人及兆身也此是爲三合巳也三真炁也三渾化也絳宫真人者䖏心中之丹田中元真人居其心中也三一經具記其事矣常以其日日中時入室存太一下逰絳宫絳宫真人忽然與太一合形次又存我入絳宫忽然復與太一合形於是絳宫之中唯覺有太一之身身形象服如兆體也但令形細眇然有似生孩之始耳畢又思存兩鼻孔下左有日右有月日中有黃精赤炁月中有赤精黃炁精者二明之質也色炁者日月之煙也二炁欝欝來入絳宫絳宫溢滿二氣復上入洞房中洞房中欝滿又下至黃庭中黃庭中者臍下三寸下丹田宫中也二炁旣滿又入塡溢太倉中二炁洞徹欝欝積胃管中存太一上行正當胃管中南向呼召下元丹田黄庭真人衣黃衣巾黃巾與太一共坐飲食精炁二十七咽良乆畢存黄庭真人呪曰日月之華黄赤二精圎光合炁上發大明三元飲食太一受靈又存太一與中元真人還入絳宫黄庭真人還下丹田宫太一與我合形還六合宫畢兆呪曰太一帝君上勑三元又爲我勑制百神百神按次相次留我一身不得妄出入金門牢玉關呪畢又存乳下日月從兩鼻孔中上到洞房洞房中有上一真人天帝也天帝是帝君之子帝君治太極紫房天帝治兩眉間却入三寸爲泥丸丹田上宫或治在兩眉間却入二寸爲洞房宫也存上一天帝左右手各持日月左手持日右手持月天帝先食日月兆當作十九咽作十九咽畢天帝吐氣氣臨太一六合宫中覺紫煙滿宫太一吸取紫烟作十九咽止名曰混合三一帝布日月精變景三宫萬神常生者也九宫上一入帝室三五合炁其本一七變入形相保宻五行參差同根節此消魔中符帝君之經也謂三真相推而上登五神禀帝魂而下分常以甲子日夜半時存太微紫房宫中有一童子如嬰孩之狀著朱衣名干景精字㑹元子正當帝君之前捧赤玉桉按上有兆五符及命籍也又存太一從六合宫來上在帝君之左童子曰符籍主生萬神皆聽甲乙之記巳書帝庭請命太一定甲之名甲兆名也帝君曰太一童子百變入巳除死上生周而復始形内萬真一勑伯史於是兆身及童子並合入太一形中良乆畢又存太一還六合宫也名曰混合童嬰於始元之炁化變太一於三真之際也故大洞真經曰太㣲小童常在帝前其名景精其姓曰干合形太一被服朱丹五符命籍把持玉桉帝君所命主通諸神此之謂也又髙上消魔經曰辛子景精有神有威合象三形九道相推衣服朱丹歩正參差出入上元太極内階知我者生存我不衰人無哭兆恃頼辟非欲知吾家䖏宻問太㣲此胎中童子變胞太一之魂也知其名字者天下萬民無得哭兆之身也常存之辟非災萬禍長生不死矣施行變合之日六甲皆佳不必專用甲子日也太一五神奉五符奉五籍上清帝君混合之道求長生神仙之訣也右桃君符以白爲地丹筆書之五帝内寳符太一帝君混化合景之道也可以本命日書五符共盛著錦囊中帶之帶之者長生不死又常以本命之月中有本命之日時入室書五符向王頓服畢呪曰太一五符神籍記生千年萬歲與天同齡帝君把籍命壽不傾若欲數服此符者常以五月五日七月七日九月九日夜半生炁時刀佳或以秋分日夜半矣上五籍奉五符混合帝君常以本命日月三月十五日二十六日夜半時生炁取令一室清浄乃可行之坐卧任意坐則接手臨目臨目者常閉而不閉也卧則閉目内視兩手拊心上存帝君上在太極紫房宫中坐存太微小童侍帝君後又存太素元成老子侍帝君左又存太和皇成老子侍帝君右次存泥丸宫天帝君上入紫房對帝君前天帝者三一之上真帝君之子泥丸洞房之寳神也又存帝君命天帝使召六合官五神五神者太一公子白元司命桃君合五人皆著朱衣絳巾一神各捧一白玉桉桉上有一符長一寸廣五分籍長五寸廣一寸事事分别各有所主籍簡在符之上也存籍有鄉里姓名如上法五神各奉以詣天帝天帝以次取著帝君前畢又存帝君命天帝召兆令上詣紫房須㬰兆從左鼻孔中入上詣紫房到帝君前帝君令兆桉次讀籍讀籍畢以奉天帝天帝取奉帝君帝君使兆以次服五符畢帝君有命天帝命召絳宫中元丹田真人又召下元命門真人詣紫房中須㬰二真人上詣紫房帝君前此二真人者是中心臍下三一神也又存天帝天帝忽合帝君形中覺從口中入變而合一也須㬰二老子又入帝君鼻兩孔中須㬰覺見絳宫命門二真人又入帝君口中須㬰又覺見五神從帝君左耳孔中入帝君六合中又存覺兆身及太微童子從帝君右耳孔中入帝君六合中都畢帝君爾時獨坐太微紫房宫中也其所命召諸神並巳合形内變入形於帝君前矣存帝君呪曰太上玄清天地同精合景紫房混化萬生五神三一二老記名太微童子從兆反形千千萬億長年以寜後帝而存神仙玉清畢兆呪曰混合旣畢死籍巳滅天帝有命不得忘失百神帝君各寳其室於是乃開目畢此爲五神奉符籍之時魂神混合之道兆精心思而存之焉右五籍五符混化必生劵以本命日日中時朱書青紙作此符一枚夜半入室存思畢服一枚向本命之處也餘一枚以鉸刀中破從上下黒沾處中分之以一半付竈火中以半付井水中每至本命日輒行之名曰保神長至之符帝君記命之劵也以白紙青筆書之本命日旦東向服之畢呪曰帝君制命九炁同煙使我不死又得飛仙制命安形太上之賔以白紙雌黃書之本命日日中時南向服之畢南向呪曰太一明靈帝君合形斬滅三尸魂魄安寧長在天中九命無傾飛昇帝前七道五生以白紙丹筆書之以本命日暮向本命服之服畢呪天玄地黄三魂在堂天黄地玄三魂在人不黄不玄帝君記年不玄不黄太一不忘使我安形萬壽無疆右太一制三魂七魄寳命符常以本命之月本命之日本命之時朱書白紙北向服之若不知生月日時者唯所知一耳亦可以戊午日日中時服之右太上寳神招帝君符以八節日日中時朱書白紙服之畢呪曰太上三玄帝君在魂太一五靈保魂安身紫房有令勑制百神帝君太一内精神符合十二首皆太上元精之炁也至真至祕不得妄傳也其别復有太一外訣符文大異者乃皆中矜帝昌經上符也非此真者用之無効兆善敬慎之帝君諱逢凌梵字履昌靈一名七靈一名神丈人常治太極紫房中端坐平正貌如嬰兒之狀常有紫炁覆其神形衣五色華衣巾日月之冠左耳上有日徑九寸右耳上有月徑一尺日日夕夕常常自存之此是帝君正形之時非變化之爲也帝君口常詠一文曰微微深哉玄首虚全八風散景變化冥淵幽然絶洞朗矣寄玄七神徘徊鍊柔三魂上帝用安惠在兆身兆身常齋慎履飛塵我則熈樂保兹泥丸血尸入目穢炁紛紛帝與太一并命五神棄宫廢宅逕昇九天子則忤矣三命即顚豈若寂靜與我纒綿此帝君之常吟詠太上虚室之神章也子常當誦習之其文以穢殗爲急忌可不慎之兆若有罪過欲首謝求除罪者夜半及日中入室閉目端坐北向存帝君在兆紫房中存思如上因又存兆身在紫房中伏帝君前内自陳𠎝併炁良夂帀令一身汗出衣服沾蒸如此者三過自解罪目散也汗帀一體畢乃呪曰某甲有罪上聞百神乞度七九水火之患守命太一拘濟帝君汗流一体怖在三魂恩惟太上永令除患畢因三呼帝君名字畢乃開目名曰帝君解過之道内謝五神流汗爲應矣世人謝過乃叩頭摶頰此外法也若修此法若修行三一守洞房帝君奉太一者慎不可以叩頭摶頰也夫人叩頭者驚三魂擾泥丸𢡖紫房傾帝君也夫人摶頰者則堅胞結束魄筯太一悲五神迁乃大忌也若所行所念但心存叩頭摶頰亦内解於心中矣仙人存心拜而巳不形屈也吾謂爲冥矣兆有知帝君名字者長生不死形不入地矣慎不可以告人告人則衛經玉童玉女去矣非盟不傳也常以庚申日日中入室或用夜半存思帝君在紫房中帝君口吹一炁輙成一人凡作七吹炁成七人又存太一從六合中宫來上詣帝君前兆巳從太一合形爲一人身耳凡七吹炁成七人太一及帝君又爲二人都合九人名爲七君九君領理血脉筯骨之道存帝君有命呪曰第一白氣君務玄子第二青炁君按延昌第三黒炁君斌來生第四黄㤅君祖明車第五赤炁君混離子皆五方色衣巾五方巾從次諸神不得雜錯第六上玄君髙同生第七下玄君叔火王各朱衣黄巾立吾後抱圖籍奉五符令命第一君主㤅第二君主血第三君主精第四君主液第五君主神第六君主魂第七君主魄太一君主髓腦帝君主本命按次相比言功記過刻除死名長上青書如天皇内令於是帝君呪畢即又因口中吹出白炁三十過炁滿紫房洞薰一身一身冥合如在雲霧中良乆豁然開目止名爲七君九君校比一身混合白炁上固泥丸之道也亦以此法除三尸七積之疾夫人生由胞胎以自變禀血精以自成故旣生而胞胎更結旣成而血液不留不留者帝君混合即巳留住之矣胞胎有十二結節盤固五内五内滯閡結不可解節不可除故人病也由節滯也人之死由結固也常以本命日若八節日上請帝君與太一混合約制百神而解胞中牢堅之結盤根之死節也胞有十二結内有十二節節在結内人不知解脱結節者亦不免死矣常解之者長生胞上結一在泥丸中二在口中三在頰中四在目中此胞之四結在上部胞中結一在五藏中二在太倉中三在大膓中四在小膓中此胞之四結在中部胞下結一在膀胱中二在隂中三在後門中四在兩足中此胞之四結在下部解結之法入室閉户存思先讀帝君以下百神名字再過畢乃按次解結此法是帝君太一混合二十四神解結除尸炁之道也兆以本命日若八節日日中夜半時任意也正坐向本命之日方接手端心叩齒二十四通呪曰男生某甲上啓胞父胞母始生之日三積留血化爲十二大結今本命之日謹請三元之神二十四真人解三關十二結請言所名東方青帝彫梁際字青平南方赤帝長來覺字南和西方白帝彰安幸字西華北方黒帝保盛昌字北伐玄一老子林虚夫字靈時道三素老子牢張上字神生道正一左仙人仲成子一名帝賔字四華正一右仙人曲文子一名光堅字靈和太微小童子干景精字會元子一名三矜交一名對帝真上胎内真等有九人外合九炁是爲九君爲甲上解結結在上關四結解散津血流源長上生籍永爲天帝仙太一尊神務猶收字歸會昌一名解明一名寄頻左無英公子玄元叔字合符子一名元素君一名神公子右白元洞陽君欝靈摽字玄夷絶一名朱精一名啓成中央司命丈人君理明初字玄度卿一名神宗一名靈華命門桃君孩道康字合精延一名命王一名胞根泥丸天帝上一赤子玄凝天字三元光一名伯無上一名伯史華泥丸天帝卿肇勒精字仲玄生一名起非一名常扶絳宫心丹田宫中一元丹皇君神運珠字子南丹一名生上伯一名史雲拘絳宫輔皇中一卿中光堅字四化靈一名幽車伯一名董史華中胎九真是爲九君廻靈九炁化入絳宫五藏大結大膓小膓皆當化散四結分昌中關調利流注太倉千災萬禍一時滅亡記上生録永無災殃命門下一黄庭元王始明精字元陽昌一名嬰兒胎一名伯史原黃庭保鎮弼卿歸上明字谷下玄一名奉申伯一名承光生第一胎中白炁君務玄子字肓常生第二結中青炁君按延昌字合和嬰第三節中黒炁君斌來生字精上門第四胞中黄炁君祖名車字神無極第五血中赤炁君混離子字叔火堅第六上玄元父君髙同生字左廻明第七下玄玄母君叔火王字右廻光下胎九君胞胎内真生化九炁是爲九魄九魄精胞中節堅使甲不壽中年願今日奉命如徃初生乞得解散十二死根名上王籍五符入身下鎮九炁永得纒綿上開九宫下開九關呪讀再過都畢當和心下炁勿令音啜而蹇也又閉目存呼太極紫房天皇太帝君逢凌梵字履昌靈一名七靈一名神丈人如此呪之三又存三九結解真君東方青帝彫梁際等訖玄母叔火王等二十七人同著朱衣巾黄巾黄巾者似逺遊冠之狀也貌如嬰兒無有長短次引太極紫房並北向對太帝君而各長跪其言曰上關彫梁際等九人中關太一務猶收九人下關下一黄庭始明精等九人三九二十七人即日縁炁内咽上開三關關有二十四結結有二十四䈥䈥即以斷結巳解散津血上衝徑滿泥丸玉液下順哺養百神即日某甲名上帝籍長生神仙畢又存太一名兆上詣帝君前帝君曰胞結巳通光内徹外使爾長生命不傾墜汝可合我形中矣帝君因開口覺我忽入帝君口中逕到帝君六合宫中帝君六合中又有太一神名重冥空字幽寥無因告兆曰可食日精矣兆即取日精食之作九咽止須㬰見向二十七真人皆在兆左右立二十七真人曰某甲胎籍巳解穢炁皆除面巳玉澤體洞太虚長生億萬帝君同符又存帝君呪曰天上同真是甲之身天上同靈是甲之形良乆都畢也此爲九君混合内化百神解胞散結開利三關上合六合併景帝君變化命籍炁鎮泥丸長生受符方爲天仙者也存思都畢乃更散髪更梳頭解衣更結衣洗手足者兆不能暗誦一二存念者可入室桉文施行之帝君泥丸中又有六合宫宫中有帝皇太一君名重冥空字幽寥無兆知之者朽骨更生五藏生華終身不畏怖畏怖之時北向呼此名三過呪曰羅阿重冥空雷風幽寥無上生帝君形祐兆使無憂畢如與千人同旅太一帝君解三關十二結胞胎内符以本命日若八節日欲施行解結時先吞此符三枚向本命䖏以眞朱書青竹中白膜也白膜生於堅節之内遂虚中而受靈者也故書竹膜爲解結之符文太一曰人有三魂利人之存人有七魄害人之命七魄朝在人左目下暮在人鼻人中下學道者欲卧先以右手𤓰按左目下及人中各三七過甚佳制七魄之道帝君太一寳玄玉經太上真人藏於五嶽華房之内非有仙籍者不得聞見此也見之者生行之者仙是故重爲盟誓來其天真以防宣泄流布離行耳自天尊貴仙然幽祕此道非仙骨者不妄授此也無至誠者不聞也有經曰師受者禮焉經之傳也從師而受經受經而用弟子之道也傳授之際各齋七日或十日先後又告齋各復一日也古者盟誓皆㰱血㫁髪立壇告天以爲不宣示信人之約也今自可以金青之陳以代髪膚之体耳列於别静祝啓上皇法用金鐶三枚鮮明赤而有光者青帛三九尺以代三契之盟亦可相連爲二十七尺耳受書當寫爲兩通修一机一也盟物備録不得𥝠用以自營也故太上中經曰夫師因經業故稱之曰生受者習焉以同其誠推盟誓天固神告靈纒綿憂樂義齊死生於是始驗尅終俱期仙庭矣爾乃奉拜諮受修盟曲室尊卑以顯三潔分别孜孜之心寳經藏宻愼行要言誠存專一保敬師經方寸敢墜如此始可與言神靈之交道德之契矣奉經而祕其道行事而遵其誓則以列名於玉簡書帝録於太極若違其道也則七祖受風刀之考玄母受胎靈之害身爲下鬼門亦煙滅槤蒙山之石以投積夜之河非夫有心之子其慎祕也哉此太上真人契令張天師演出於丹景經中有是慎盟之書也受太上帝君之道用事如此故記而修行焉金鐶三枚盟三元之誓青二十七尺䌝帛也盟帝君二十四神人之誓也赤絲五兩以盟五神公子之誓也和香二裹以爲告靈交氣之煙也筆一枚紙一丈丹一兩書盟也右五種物以噐盛之不宣露也皆受書者具之也弟子寫畢乃賫書及物來詣師室而受書受書畢乃得施用耳不盟受而竊行之者案女青詔書失兩明也受如不行者有天火考也行而不精宣泄者有風刀災考也傳非其人七世父母受其考也此玄都鬼律女青詔書之㫖洞真太一帝君太丹隱書洞真玄經
